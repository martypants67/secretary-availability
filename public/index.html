<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secretary Availability</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:32px 36px;max-width:460px;width:100%}
    .card h2{margin:0 0 6px;font-size:18px;color:#1a1a1a}
    .card p{margin:0 0 24px;font-size:14px;color:#666;line-height:1.5}
    hr{border:none;border-top:1px solid #eee;margin:24px 0}
  </style>
</head>
<body>
  <div class="card">
    <h2>Contact our practice manager</h2>
    <p>Call us during the times shown below and Sophie will be available to take your call.</p>
    <hr>
    <div id="secretary-availability"></div>
  </div>
  <script src="/widget.js" data-endpoint="/api/availability" data-target="secretary-availability"></script>
</body>
</html>
